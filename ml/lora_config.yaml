# Model - using pre-quantized 4-bit triggers QLoRA automatically
model: "mlx-community/Phi-4-mini-instruct-4bit"

# Training flags
train: true
test: false
data: "./data"
seed: 42

# Architecture
fine_tune_type: lora
num_layers: 16 # Number of model layers to apply LoRA to

# Training hyperparameters
batch_size: 1 # Keep at 1 for 18GB memory safety
grad_accumulation_steps: 4 # Effective batch size = 4
iters: 1000
learning_rate: 2e-4 # Higher LR works well with QLoRA
max_seq_length: 2048

# Memory optimization
grad_checkpoint: true # Trades compute for memory

# Logging and saving
steps_per_report: 10
steps_per_eval: 100
val_batches: 25
save_every: 200
adapter_path: "adapters"

# LoRA-specific parameters (config file only)
lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 8
  scale: 10.0
  dropout: 0.05

# Optional: learning rate schedule
# lr_schedule:
#   name: cosine_decay
#   warmup: 100
#   warmup_init: 1e-7
#   arguments: [1e-5, 1000, 1e-7]
